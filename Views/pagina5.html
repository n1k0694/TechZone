<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    <script>
        fetch("/Components/header.html").then(res => res.text()).then(html => { document.getElementById("header").innerHTML = html; });
        fetch("/Components/footer.html").then(res => res.text()).then(html => { document.getElementById("footer").innerHTML = html; });
    </script>
    <title>Módulo de Cotizaciones - TechZone SpA</title>
</head>

<body class="bg-light">
    <div id="header"></div>

    <div class="container mt-5 mb-5">
        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-dark text-white py-3">
                        <h5 class="mb-0"><i class="bi bi-cart-plus-fill me-2"></i>Añadir Componentes</h5>
                    </div>
                    <div class="card-body p-4 bg-white">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Seleccionar Producto:</label>
                                <select id="selectVentaProducto" class="form-select"></select>
                            </div>
                            <div class="col-md-4">
                                <button type="button" id="btnAgregarCarrito" class="btn btn-primary w-100 fw-bold"><i
                                        class="bi bi-plus-lg"></i> Agregar</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white py-3">
                        <h5 class="mb-0"><i class="bi bi-person-check-fill me-2"></i>Datos del Cotizante</h5>
                    </div>
                    <div class="card-body p-4 bg-white">
                        <form id="formCheckout">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Nombre Completo del Solicitante:</label>
                                <input type="text" id="nombreCliente" class="form-control"
                                    placeholder="Ej: Nicolás Castro" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email:</label>
                                <input type="email" id="email" class="form-control" placeholder="nicolas@empresa.cl"
                                    required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Teléfono Celular:</label>
                                <input type="text" id="telefono" class="form-control" placeholder="+56912345678"
                                    required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 fw-bold py-2 shadow-sm"><i
                                    class="bi bi-file-earmark-pdf-fill me-1"></i> Generar Cotización</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="card shadow-sm border-0 sticky-top" style="top: 20px;">
                    <div class="card-header bg-secondary text-white py-3">
                        <h5 class="mb-0"><i class="bi bi-receipt me-2"></i>Resumen del Presupuesto</h5>
                    </div>
                    <div class="card-body p-4 bg-white">
                        <table class="table align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Componente</th>
                                    <th class="text-center">Cant.</th>
                                    <th class="text-end">Subtotal</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-carrito-body"></tbody>
                        </table>
                        <hr>
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="fw-bold mb-0">Total Neto:</h5>
                            <h4 class="fw-bold text-success mb-0" id="txtTotalVenta">$0</h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>
    <script src="/js/cotizaciones.js"></script>
    <script src="/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
