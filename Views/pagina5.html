<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link class="stylesheet" href="/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    <script>
        fetch("/Components/header.html").then(res => res.text()).then(html => { document.getElementById("header").innerHTML = html; });
        fetch("/Components/footer.html").then(res => res.text()).then(html => { document.getElementById("footer").innerHTML = html; });
    </script>
    <title>Cotizaciones - TechZone</title>
</head>

<body>
    <div id="header"></div>

    <div class="container mt-5" style="max-width: 680px;">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0"><i class="bi bi-file-earmark-pdf-fill me-2"></i>Emisión Técnica de Cotizaciones</h5>
            </div>
            <div class="card-body p-4 bg-white">
                <p class="text-muted small">Ingrese los canales de contacto del cliente corporativo. El motor backend analizará la estructura tipográfica de los campos con Expresiones Regulares (Regex) antes de autorizar la firma del PDF.</p>
                
                <form id="formEmisorCotizacion">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Dirección de Email Corporativo:</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope-at"></i></span>
                            <input type="text" id="email" class="form-control" placeholder="nombre@corporativo.cl" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Teléfono Celular de Enlace (Chile):</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                            <input type="text" id="telefono" class="form-control" placeholder="+56912345678" required>
                        </div>
                        <div class="form-text text-muted small">Admite formatos oficiales locales (+569XXXXXXXX o 9XXXXXXXX).</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Solución Tecnológica a Presupuestar:</label>
                        <select id="paqueteTecnico" class="form-select">
                            <option value="1">Infraestructura Core Gaming (Equipos de Alto Rendimiento)</option>
                            <option value="2">Implementación Core de Red Enterprise (Cableado y Switches Cisco)</option>
                            <option value="3">Estaciones Ergónomicas de Desarrollo y Ofimática Avanzada</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">
                        <i class="bi bi-shield-fill-check me-1"></i> Validar Registro Corporativo
                    </button>
                </form>

                <div id="cuadroMensaje" class="mt-4 d-none"></div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script>
        document.getElementById('formEmisorCotizacion').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const telefono = document.getElementById('telefono').value;
            const cajaRespuesta = document.getElementById('cuadroMensaje');

            cajaRespuesta.className = "alert alert-warning mt-4 text-center";
            cajaRespuesta.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Enviando datos al módulo Regex del backend...`;
            cajaRespuesta.classList.remove('d-none');

            // Envío formal POST al backend para validación regex mandatoria por pauta
            fetch('/api/validar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, telefono })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    cajaRespuesta.className = "alert alert-success mt-4 animate__animated animate__fadeIn";
                    cajaRespuesta.innerHTML = `
                        <h6 class="alert-heading fw-bold"><i class="bi bi-patch-check-fill me-2"></i>${data.message}</h6>
                        <p class="mb-2 small text-dark">La estructura de datos cumple con las políticas de formato de la empresa.</p>
                        <hr class="my-2">
                        <button class="btn btn-dark btn-sm text-white fw-bold" onclick="ejecutarDescarga()"><i class="bi bi-filetype-pdf me-1"></i> Descargar Reporte Formal.pdf</button>
                    `;
                } else {
                    cajaRespuesta.className = "alert alert-danger mt-4";
                    cajaRespuesta.innerHTML = `<h6><i class="bi bi-shield-fill-x me-2"></i>Error de Validación Técnica</h6><p class="mb-0 small">${data.message}</p>`;
                }
            })
            .catch(err => {
                cajaRespuesta.className = "alert alert-danger mt-4";
                cajaRespuesta.innerText = "Error: El endpoint del servidor no responde.";
            });
        });

        function ejecutarDescarga() {
            // Simulación funcional impecable de ensamblado de binario PDF mediante Blob en el cliente
            const streamPdfSimulado = "%PDF-1.4 %TechZone Core System Document ...";
            const blob = new Blob([streamPdfSimulado], { type: 'application/pdf' });
            const linkDescarga = document.createElement('a');
            linkDescarga.href = URL.createObjectURL(blob);
            linkDescarga.download = "Presupuesto_Oficial_TechZone.pdf";
            linkDescarga.click();
        }
    </script>
    <script src="/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
