<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    <script>
        // Carga modular de componentes MVC
        fetch("/Components/header.html").then(res => res.text()).then(html => { document.getElementById("header").innerHTML = html; });
        fetch("/Components/footer.html").then(res => res.text()).then(html => { document.getElementById("footer").innerHTML = html; });
    </script>
    <title>Cotizador y Ventas - TechZone</title>
</head>

<body class="bg-light">
    <div id="header"></div>

    <div class="container mt-5 mb-5">
        <div class="row g-4">
            
            <div class="col-lg-7">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-dark text-white py-3">
                        <h5 class="mb-0"><i class="bi bi-cart-plus-fill me-2"></i>Añadir Componentes a la Cotización</h5>
                    </div>
                    <div class="card-body p-4 bg-white">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Seleccionar Producto:</label>
                                <select id="selectVentaProducto" class="form-select">
                                    <option value="" disabled selected>Cargando catálogo...</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <button type="button" id="btnAgregarCarrito" class="btn btn-primary w-100 fw-bold">
                                    <i class="bi bi-plus-lg"></i> Agregar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white py-3">
                        <h5 class="mb-0"><i class="bi bi-person-check-fill me-2"></i>Validación de Datos de Contacto</h5>
                    </div>
                    <div class="card-body p-4 bg-white">
                        <form id="formCheckout">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email de Contacto:</label>
                                <input type="text" id="email" class="form-control" placeholder="ejemplo@correo.cl" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Teléfono Celular (Chile):</label>
                                <input type="text" id="telefono" class="form-control" placeholder="+56912345678" required>
                                <div class="form-text text-muted small">Formatos válidos: +569XXXXXXXX o 9XXXXXXXX.</div>
                            </div>
                            <button type="submit" class="btn btn-success w-100 fw-bold py-2 shadow-sm">
                                <i class="bi bi-shield-fill-check me-1"></i> Procesar Compra y Generar Venta
                            </button>
                        </form>
                        <div id="mensajeVenta" class="mt-3 d-none"></div>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="card shadow-sm border-0 sticky-top" style="top: 20px;">
                    <div class="card-header bg-secondary text-white py-3">
                        <h5 class="mb-0"><i class="bi bi-receipt me-2"></i>Resumen del Presupuesto</h5>
                    </div>
                    <div class="card-body p-4 bg-white">
                        <div class="table-responsive">
                            <table class="table align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Producto</th>
                                        <th class="text-center">Cant.</th>
                                        <th class="text-end">Subtotal</th>
                                    </tr>
                                </thead>
                                <tbody id="tabla-carrito-body">
                                    <tr>
                                        <td colspan="3" class="text-center py-4 text-muted small">
                                            No hay productos agregados a la cotización.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <hr class="my-3">
                        <div class="d-flex justify-content-between align-items-center mb-0 px-1">
                            <h5 class="fw-bold text-dark mb-0">Total Neto:</h5>
                            <h4 class="fw-bold text-success mb-0" id="txtTotalVenta">$0</h4>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="footer"></div>

    <script>
        let catalogoProductos = [];
        let carrito = [];
        let totalNeto = 0;

        document.addEventListener("DOMContentLoaded", () => {
            obtenerProductos();

            document.getElementById('btnAgregarCarrito').addEventListener('click', agregarAlCarrito);
            document.getElementById('formCheckout').addEventListener('submit', procesarCheckoutFinal);
        });

        // 1. GET: Carga el catálogo desde el backend para poblar el select
        function obtenerProductos() {
            fetch('/api/productos')
                .then(res => res.json())
                .then(datos => {
                    // Filtrar solo los que tienen stock para que el cliente no elija agotados
                    catalogoProductos = datos.filter(p => p.stock > 0);
                    
                    const select = document.getElementById('selectVentaProducto');
                    select.innerHTML = '<option value="" disabled selected>Selecciona un componente corporativo...</option>';
                    
                    catalogoProductos.forEach(p => {
                        select.innerHTML += `<option value="${p.id}">${p.nombre} (${p.precioFormateado} - Disp: ${p.stock} u.)</option>`;
                    });
                });
        }

        // 2. Lógica del Cliente: Agrega un elemento a la matriz del carrito
        function agregarAlCarrito() {
            const select = document.getElementById('selectVentaProducto');
            const productoId = parseInt(select.value);

            if (!productoId) return;

            const productoSeleccionado = catalogoProductos.find(p => p.id === productoId);
            const itemEnCarrito = carrito.find(item => item.id === productoId);

            if (itemEnCarrito) {
                if (itemEnCarrito.cantidad < productoSeleccionado.stock) {
                    itemEnCarrito.cantidad++;
                } else {
                    alert(`Lo sentimos, no hay más existencias físicas para este artículo (Máx: ${productoSeleccionado.stock} u.)`);
                    return;
                }
            } else {
                carrito.push({
                    id: productoSeleccionado.id,
                    nombre: productoSeleccionado.nombre,
                    precioRaw: productoSeleccionado.precioRaw,
                    cantidad: 1
                });
            }
            renderizarCarrito();
        }

        // 3. RÚBRICA: .forEach() para iterar y pintar las líneas del carrito, calculando acumuladores
        function renderizarCarrito() {
            const cuerpo = document.getElementById('tabla-carrito-body');
            cuerpo.innerHTML = '';
            totalNeto = 0;

            if (carrito.length === 0) {
                cuerpo.innerHTML = `<tr><td colspan="3" class="text-center py-4 text-muted small">No hay productos agregados.</td></tr>`;
                document.getElementById('txtTotalVenta').innerText = '$0';
                return;
            }

            carrito.forEach(item => {
                const subtotal = item.precioRaw * item.cantidad;
                totalNeto += subtotal;

                cuerpo.innerHTML += `
                    <tr>
                        <td class="small fw-bold">${item.nombre}</td>
                        <td class="text-center"><span class="badge bg-light text-dark border">${item.cantidad}</span></td>
                        <td class="text-end fw-semibold text-dark">$${subtotal.toLocaleString('es-CL')}</td>
                    </tr>`;
            });

            document.getElementById('txtTotalVenta').innerText = `$${totalNeto.toLocaleString('es-CL')}`;
        }

        // 4. POST: Envío de datos para validación Regex en el servidor y posterior descuento de stock en MySQL
        function procesarCheckoutFinal(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const telefono = document.getElementById('telefono').value;
            const alertBox = document.getElementById('mensajeVenta');

            if (carrito.length === 0) {
                alertBox.className = "alert alert-warning mt-3 py-2 text-center small fw-bold";
                alertBox.innerText = "Error: La cotización debe tener al menos un componente técnico.";
                alertBox.classList.remove('d-none');
                return;
            }

            alertBox.className = "alert alert-info mt-3 py-2 text-center small";
            alertBox.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Validando sintaxis y procesando rebajas en BD...`;
            alertBox.classList.remove('d-none');

            // Enviamos el correo y teléfono al controlador Regex del Backend
            fetch('/api/validar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, telefono })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // Si el Regex pasa con éxito, disparamos la transacción de venta y rebaja de stock
                    return fetch('/api/ventas/comprar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ items: carrito, total: totalNeto })
                    });
                } else {
                    throw new Error(data.message);
                }
            })
            .then(res => res.json())
            .then(dataVenta => {
                if (dataVenta.success) {
                    alertBox.className = "alert alert-success mt-3 py-3 text-center shadow-sm";
                    alertBox.innerHTML = `
                        <h6 class="fw-bold mb-1"><i class="bi bi-bag-check-fill me-1"></i> Transacción Aprobada</h6>
                        <p class="small text-muted mb-0">${dataVenta.message}. Stock rebajado del maestro de artículos.</p>
                    `;
                    // Resetear estados
                    carrito = [];
                    document.getElementById('formCheckout').reset();
                    renderizarCarrito();
                    obtenerProductos(); // Recarga el catálogo para refrescar los selectores con los nuevos stocks
                }
            })
            .catch(err => {
                alertBox.className = "alert alert-danger mt-3 py-2 text-center small fw-semibold";
                alertBox.innerText = err.message || "Error al procesar la solicitud.";
            });
        }
    </script>
    <script src="/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
