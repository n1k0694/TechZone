<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    <script>
        // Carga modular de los componentes reutilizables
        fetch("/Components/header.html").then(res => res.text()).then(html => { document.getElementById("header").innerHTML = html; });
        fetch("/Components/footer.html").then(res => res.text()).then(html => { document.getElementById("footer").innerHTML = html; });
    </script>
    <title>Historial de Cotizaciones - TechZone</title>
</head>

<body class="bg-light">
    <div id="header"></div>

    <div class="container mt-5">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0"><i class="bi bi-search me-2"></i>Consola de Auditoría: Historial General de Cotizaciones</h5>
            </div>
            <div class="card-body p-4 bg-white">
                <p class="text-muted small">A continuación, se despliega el registro histórico de los presupuestos emitidos.</p>
                
                <div class="table-responsive">
                    <table class="table table-hover align-middle small">
                        <thead class="table-dark">
                            <tr>
                                <th style="width: 80px;" class="text-center">Visualizar</th>
                                <th style="width: 150px;">N° Documento</th>
                                <th style="width: 140px;">Fecha Emisión</th>
                                <th>Email Solicitante</th>
                                <th style="width: 160px;" class="text-end">Total General (c/IVA)</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-cotizaciones-body">
                            <tr>
                                <td colspan="5" class="text-center py-4 text-muted">
                                    <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                                    Sincronizando registros con MySQL...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>
    
    <script src="/js/historial.js"></script>
    <script src="/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
