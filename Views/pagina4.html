<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    <script>
        // Carga modular desde la carpeta Components (Cumple MVC)
        fetch("/Components/header.html")
            .then(res => res.text())
            .then(html => { document.getElementById("header").innerHTML = html; });
        fetch("/Components/footer.html")
            .then(res => res.text())
            .then(html => { document.getElementById("footer").innerHTML = html; });
    </script>
    <title>Inventario - TechZone</title>
</head>

<body class="bg-light">
    <div id="header"></div>

    <div class="container mt-5">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0"><i class="bi bi-plus-circle-fill me-2"></i>Consola de Carga: Abastecimiento de Stock
                    (Admin)</h5>
            </div>
            <div class="card-body p-4 bg-white">
                <form id="formCargaInventario" class="row g-3 align-items-end">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Seleccionar Componente Tecnológico:</label>
                        <select id="selectProducto" class="form-select" required>
                            <option value="" disabled selected>Cargando catálogo disponible...</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Cantidad a Ingresar:</label>
                        <input type="number" id="inputCantidad" class="form-control" min="1" placeholder="Ej: 10"
                            required>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-primary w-100 fw-bold">
                            <i class="bi bi-box-seam-fill me-1"></i> Incrementar Stock
                        </button>
                    </div>
                </form>
                <div id="mensajeAdmin" class="mt-3 d-none"></div>
            </div>
        </div>

        <div class="card shadow-sm border-0 mb-5">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
                <h5 class="mb-0"><i class="bi bi-hdd-network-fill me-2"></i>Monitoreo de Existencias Real (Base de
                    Datos)</h5>
                <div>
                    <button class="btn btn-outline-info btn-sm fw-bold me-2" id="btnRestablecer">
                        <i class="bi bi-arrow-clockwise"></i> Mostrar Todo
                    </button>
                    <button class="btn btn-warning btn-sm text-dark fw-bold" id="btnFiltrarStock">
                        <i class="bi bi-filter-square-fill me-1"></i> Filtrar Disponibles
                    </button>
                </div>
            </div>
            <div class="card-body p-4 bg-white">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Código</th>
                                <th>Descripción del Componente</th>
                                <th>Línea / Categoría</th>
                                <th>Precio (CLP)</th>
                                <th>Existencias</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-productos-body">
                            <tr>
                                <td colspan="5" class="text-center py-4 text-muted">
                                    <span class="spinner-border spinner-border-sm me-2"></span>Sincronizando registros
                                    con la base de datos...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script>
        // Matriz global que persistirá el estado de la consulta a la BD
        let matrizInventario = [];

        document.addEventListener("DOMContentLoaded", () => {
            // Inicializar la carga de datos maestros
            obtenerCatalogo();

            // Interceptar el submit de reabastecimiento
            document.getElementById('formCargaInventario').addEventListener('submit', ejecutarCargaStock);

            // Evento para aislar elementos disponibles usando .filter()
            document.getElementById('btnFiltrarStock').addEventListener('click', () => {
                const conStock = matrizInventario.filter(p => p.stock > 0);
                renderizarTabla(conStock);
            });

            // Evento para restablecer la vista con el catálogo original completo
            document.getElementById('btnRestablecer').addEventListener('click', () => {
                renderizarTabla(matrizInventario);
            });
        });

        // GET: Sincroniza y trae los datos frescos de MySQL
        function obtenerCatalogo() {
            fetch('/api/productos')
                .then(res => res.json())
                .then(datos => {
                    matrizInventario = datos;
                    renderizarTabla(matrizInventario);
                    poblarSelectAdmin(matrizInventario);
                })
                .catch(err => {
                    document.getElementById('tabla-productos-body').innerHTML = `<tr><td colspan="5" class="text-center text-danger py-3">Error al conectar con la base de datos corporativa.</td></tr>`;
                });
        }

        // RÚBRICA: Uso del método iterativo .forEach() para pintar el DOM dinámicamente
        function renderizarTabla(coleccion) {
            const cuerpo = document.getElementById('tabla-productos-body');
            cuerpo.innerHTML = '';

            if (coleccion.length === 0) {
                cuerpo.innerHTML = `<tr><td colspan="5" class="text-center py-3 text-muted">No se encontraron artículos en esta vista.</td></tr>`;
                return;
            }

            coleccion.forEach(item => {
                let claseColor = '';

                if (item.stock === 0) {
                    claseColor = 'bg-danger';
                } else if (item.stock < 5) {
                    claseColor = 'bg-warning text-dark';
                }
                else {
                    claseColor = 'bg-success';
                };
                cuerpo.innerHTML += `
                        <tr>
                            <td><span class="badge bg-secondary px-2 py-1">ID-${item.id}</span></td>
                            <td class="fw-bold text-dark">${item.nombre}</td>
                            <td><span class="badge bg-light text-primary border border-primary-subtle text-uppercase small">${item.categoria}</span></td>
                            <td class="fw-bold">${item.precioFormateado.toLocaleString('es-CL')}</td>
                            <td>
                                <span class="badge ${claseColor} d-inline-block text-center" style="min-width: 80px;">
                                    ${item.stock} Unidades
                                </span>
                            </td>
                        </tr>`;
            });
        };

        // Llena el selector desplegable del Administrador usando .forEach()
        function poblarSelectAdmin(coleccion) {
            const select = document.getElementById('selectProducto');
            select.innerHTML = '<option value="" disabled selected>Selecciona un artículo para reabastecer...</option>';

            coleccion.forEach(item => {
                select.innerHTML += `<option value="${item.id}">${item.nombre} (Stock: ${item.stock} u.)</option>`;
            });
        }

        // POST: Envía el incremento de stock hacia la API Express transaccional
        function ejecutarCargaStock(e) {
            e.preventDefault();
            const producto_id = document.getElementById('selectProducto').value;
            const cantidad = parseInt(document.getElementById('inputCantidad').value);
            const alertBox = document.getElementById('mensajeAdmin');

            fetch('/api/inventario/agregar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ producto_id, cantidad })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alertBox.className = "alert alert-success mt-3 py-2 text-center fw-bold shadow-sm";
                        alertBox.innerHTML = `<i class="bi bi-check-circle-fill me-1"></i> ${data.message}`;
                        alertBox.classList.remove('d-none');
                        document.getElementById('formCargaInventario').reset();
                        obtenerCatalogo(); // Recarga los datos de la base de datos para actualizar la tabla e inputs
                    }
                })
                .catch(err => {
                    alertBox.className = "alert alert-danger mt-3 py-2 text-center";
                    alertBox.innerText = "Error crítico de red al procesar el incremento.";
                });
        }
    </script>
    <script src="/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
