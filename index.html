<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS y JS -->
    <link rel="stylesheet" href="./bootstrap-5.3.8-dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- Estilos CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <script>
        //carga del header
        fetch("files/header.html")
            .then(res => res.text())
            .then(html => {
                document.getElementById("header").innerHTML = html;
            })
            .catch(error => console.error("Error al cargar el header:", error));
        //carga del footer
        fetch("files/footer.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("footer").innerHTML = data;
            })
            .catch(error => console.error("Error al cargar el footer:", error));
    </script>
    <title>Inicio - TechZone</title>
</head>

<body>
    <!-- Espacio reservado para el menú -->
    <div id="header"></div>

    <!-- Contenido principal -->
    <div class="landing-container text-center mt-5">
        <div class="container">
            <div class="row justify-content-center align-items-center mb-3">
                <!-- Columna del texto -->
                <div class="col-auto">
                    <h1 class="display-4 mb-0">Bienvenido a</h1>
                </div>

                <!-- Columna del logo -->
                <div class="col-auto">

                    <img src="./img/logo-final.png" alt="TechZone Logo" id="logo-central">

                </div>
            </div>
        </div>
        <hr class="border-secondary w-50 mx-auto mb-2">
        <p class="lead mb-4">
            Tu tienda online de productos tecnológicos, periféricos y accesorios para gaming y trabajo remoto.
        </p>
        <div class="container">
            <div class="row justify-content-center">
                <div class="mb-4">
                    <img src="./img/image01.png" id="imagen01">
                </div>
            </div>
        </div>
        <!-- Botón -->
        <a href="#" class="btn btn-primary btn-lg m-2" data-bs-toggle="modal" data-bs-target="#catalogoModal">
            Explorar catálogo
        </a>
        <!-- Modal Catálogo -->
        <div class="modal fade" id="catalogoModal" tabindex="-1" aria-labelledby="catalogoModalLabel"
            aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title" id="catalogoModalLabel">Catálogo de Productos</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                            aria-label="Cerrar"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row" id="catalogo"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="container mt-4">
            <h4>Carrito de Compras</h4>
            <ul id="listaCarrito" class="list-group mb-3"></ul>
            <p class="fw-bold">Total: $<span id="totalCarrito">0</span></p>
        </div>
        <!-- app node. Seccion noticias -->
        <div class="accordion" id="accordionNoticias">
            <script>
                // Al cargar la página, traer noticias desde el backend
                document.addEventListener("DOMContentLoaded", () => {
                    fetch("http://localhost:3000/api/noticias")
                        .then(res => res.json())
                        .then(data => {
                            const accordion = document.getElementById("accordionNoticias");
                            accordion.innerHTML = ""; // limpiar contenido inicial

                            data.forEach((noticia, index) => {
                                const item = `
                                    <div class="accordion-item">
                                    <h2 class="accordion-header" id="heading${index}">
                                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${index}" aria-expanded="false" aria-controls="collapse${index}">
                                        ${noticia.titulo}
                                        </button>
                                    </h2>
                                    <div id="collapse${index}" class="accordion-collapse collapse" aria-labelledby="heading${index}" data-bs-parent="#accordionNoticias">
                                        <div class="accordion-body">
                                        ${noticia.contenido}
                                        </div>
                                    </div>
                                    </div>
                                `;
                                accordion.innerHTML += item;
                            });
                        })
                    .catch(err => console.error("Error al cargar noticias:", err));
                });
            </script>
        </div>

        <!-- inicio del footer  -->
        <div id="footer"></div>

        <script src="js/app.js"></script>
        <script src="./bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
